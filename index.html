<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Decoración profesional de eventos en Colombia: cumpleaños, quince años, baby shower, bautizos y grados. Arcos de globos, montajes temáticos y más. Cotiza por WhatsApp." />
    <meta name="theme-color" content="#7A5934" />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:title" content="Decora Events — Decoración de Eventos en Colombia" />
    <meta property="og:description" content="Decoración profesional de eventos en Colombia: cumpleaños, quince años, baby shower, bautizos y grados. Cotiza por WhatsApp." />
    <meta property="og:image" content="https://decora-events.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://decora-events.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Decora Events" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Google Fonts: Cinzel + Cormorant Garamond + Inter.
         Carga asíncrona para no bloquear el primer pintado (display=swap evita texto invisible) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload de la fuente del titular (Cinzel, subset latin). Estabiliza
         la LCP de la home: el <h1> del hero usa Cinzel y, sin esto, su pintado
         queda a la espera del swap de la fuente cargada de forma asíncrona.
         La URL está fijada a la versión v26 de Google Fonts; si Google la
         actualiza, el preload degrada a no-op y la fuente sigue cargando por
         el CSS asíncrono (refrescar la URL desde el CSS de Google si pasa). -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://fonts.gstatic.com/s/cinzel/v26/8vIJ7ww63mVu7gt79mT7.woff2"
    />
    <!-- Dominios de imágenes (hero y catálogo) -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://placehold.co" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap"
      />
    </noscript>

    <title>Decora Events — Decoración de Eventos en Colombia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
